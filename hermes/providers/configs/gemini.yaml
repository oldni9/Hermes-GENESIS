name: gemini

display_name: Google Gemini

client: GeminiClient

type: cloud

enabled: true

supports:

  text: true
  vision: true
  image: true
  audio: true
  video: true
  embeddings: true
  live: true

connection:

  api_key_env: GEMINI_API_KEY

models:

  default: gemini-2.5-pro

  available:

    - gemini-2.5-pro
    - gemini-2.5-flash
    - gemini-2.5-flash-lite